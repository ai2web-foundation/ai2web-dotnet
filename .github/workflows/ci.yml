name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    name: .NET tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"
      - run: dotnet build Ai2Web/Ai2Web.csproj -c Release
      - run: dotnet run --project Ai2Web.Tests -c Release
