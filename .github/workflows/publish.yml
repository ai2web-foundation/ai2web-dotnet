name: Publish

# Publishes Ai2Web to NuGet via Trusted Publishing (OIDC, no stored API key).
# Triggered by publishing a GitHub Release. The nuget.org package version comes from
# <Version> in Ai2Web/Ai2Web.csproj, so bump that, then create a release to publish.
on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  publish:
    name: Publish to NuGet (Trusted Publishing)
    runs-on: ubuntu-latest
    # Must match the "Environment" set in the nuget.org Trusted Publishing policy (production).
    environment: production
    permissions:
      id-token: write   # required: lets the job request a GitHub OIDC token
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Pack
        run: dotnet pack Ai2Web/Ai2Web.csproj -c Release -o ./artifacts

      - name: NuGet login (trusted publishing)
        id: login
        uses: NuGet/login@v1
        with:
          # Your nuget.org account username (the package owner in the policy).
          user: rolandfarkas

      - name: Push to NuGet
        run: >
          dotnet nuget push ./artifacts/*.nupkg
          --api-key "${{ steps.login.outputs.NUGET_API_KEY }}"
          --source https://api.nuget.org/v3/index.json
          --skip-duplicate
